<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Home | SK Tibagan</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- TOP NAVBAR -->
<nav class="navbar navbar-dark bg-primary px-3">
    <span class="navbar-brand">SK Tibagan</span>

    {% if request.user.is_authenticated %}
       <a href="{% url 'logout_confirm' %}" class="btn btn-outline-danger btn-sm">
  Logout
</a>

    {% endif %}
</nav>

<!-- MAIN CONTENT -->
<div class="container mt-4">

    <h2>Welcome, {{ request.user.username }}</h2>

    <hr>

    <div class="alert alert-info">
        This page is for <strong>residents / normal users only</strong>.
    </div>

    <p>No admin links here.</p>

</div>

</body>
</html>
