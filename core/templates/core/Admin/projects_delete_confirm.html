{% extends "core/admin_base.html" %}


{% block content %}
<h2>Delete Project</h2>

<p>Are you sure you want to delete <strong>{{ project.title }}</strong>?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
    <a href="{% url 'projects_list' %}">Cancel</a>
</form>
{% endblock %}
