{% extends "core/admin_base.html" %}


{% block title %}Activity Logs{% endblock %}

{% block content %}
<h2>Activity Logs</h2>
<hr>

<table class="table table-striped">
    <thead>
        <tr>
            <th>User</th>
            <th>Action</th>
            <th>Date</th>
        </tr>
    </thead>
    <tbody>
        {% for log in logs %}
        <tr>
            <td>{{ log.user }}</td>
            <td>{{ log.action }}</td>
            <td>{{ log.created_at }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="3">No activity logs.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
